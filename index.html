<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Wheel Lebaran 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --emerald: #064e3b;
            --gold: #fbbf24;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: radial-gradient(circle, #065f46 0%, #022c22 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
        }

        h1 {
            color: var(--gold);
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            margin: 10px 0;
            font-size: 28px;
        }

        /* WRAPPER RODA AGAR BESAR */
        .wheel-box {
            position: relative;
            width: 380px; /* Ukuran Roda */
            height: 380px;
            margin: 20px auto;
            border: 10px solid var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.4);
            background: #047857;
        }

        canvas#wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        /* JARUM PENUNJUK */
        .marker {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid #ff0000; /* Warna Merah biar jelas */
            z-index: 100;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        button#spinBtn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(to bottom, #fbbf24, #d97706);
            color: #064e3b;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-top: 10px;
        }

        button#spinBtn:active { transform: scale(0.95); }

        /* Fake Notif di Bawah */
        #fakeNotify {
            position: fixed;
            bottom: 20px;
            background: white;
            color: black;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: none;
            z-index: 99;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌙 EID MEGA WHEEL 🌙</h1>
    <p id="welcomeText">Silahkan isi nama dahulu...</p>

    <div class="wheel-box">
        <div class="marker"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>

    <button id="spinBtn">SPIN NOW</button>
</div>

<div id="fakeNotify"></div>

<script>
    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spinBtn");
    
    // HADIAH & WARNA
    const sectors = [
        { label: "Rp 50.000", color: "#065f46" },
        { label: "ZONK", color: "#047857" },
        { label: "Rp 100.000", color: "#065f46" },
        { label: "ZONK", color: "#047857" },
        { label: "Rp 200.000", color: "#065f46" },
        { label: "Rp 75.000", color: "#047857" },
        { label: "ZONK", color: "#065f46" },
        { label: "Rp 150.000", color: "#047857" }
    ];

    const rand = (m, M) => Math.random() * (M - m) + m;
    const tot = sectors.length;
    const arc = 2 * Math.PI / tot;
    let ang = 0; 
    let angVel = 0; 
    let isSpinning = false;
    let username = "";

    // 1. FUNGSI GAMBAR RODA (Pasti muncul nominalnya)
    function drawSector(sector, i) {
        const angStart = arc * i;
        ctx.save();
        ctx.beginPath();
        ctx.fillStyle = sector.color;
        ctx.moveTo(250, 250);
        ctx.arc(250, 250, 250, angStart, angStart + arc);
        ctx.lineTo(250, 250);
        ctx.fill();
        ctx.strokeStyle = "#fbbf24";
        ctx.stroke();

        // Tulisan Hadiah
        ctx.translate(250, 250);
        ctx.rotate(angStart + arc / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = "#fff";
        ctx.font = "bold 24px Arial";
        ctx.fillText(sector.label, 230, 10);
        ctx.restore();
    }

    function renderWheel() {
        ctx.clearRect(0, 0, 500, 500);
        sectors.forEach(drawSector);
    }

    // 2. FUNGSI PUTAR
    function rotate() {
        if (!isSpinning) return;
        ang += angVel;
        angVel *= 0.985; // Gesekan biar makin pelan
        if (angVel < 0.002) {
            isSpinning = false;
            angVel = 0;
            const finalIndex = Math.floor(tot - (ang / (2 * Math.PI)) % 1 * tot) % tot;
            const reward = sectors[finalIndex].label;
            
            if(reward === "ZONK") {
                Swal.fire("Yah!", "Coba lagi besok ya!", "error");
            } else {
                Swal.fire("SELAMAT!", `User ${username} menang ${reward}`, "success").then(() => {
                    window.location.href = "https://lawaswow.com/";
                });
            }
        }
        canvas.style.transform = `rotate(${ang}rad)`;
        requestAnimationFrame(rotate);
    }

    // 3. POPUP USERNAME DI AWAL (Pasti muncul)
    document.addEventListener("DOMContentLoaded", () => {
        renderWheel();
        
        Swal.fire({
            title: 'Masukkan User ID',
            input: 'text',
            inputPlaceholder: 'ID Akun Anda...',
            allowOutsideClick: false,
            confirmButtonText: 'Masuk Game',
            confirmButtonColor: '#065f46'
        }).then((result) => {
            if (result.value) {
                username = result.value;
                document.getElementById("welcomeText").innerHTML = `Selamat Datang, <b>${username}</b>!`;
                // Mulai notifikasi palsu setelah login
                setInterval(showFakeNotif, 4000);
            }
        });
    });

    spinBtn.onclick = () => {
        if (!username) return;
        if (isSpinning) return;
        isSpinning = true;
        angVel = rand(0.15, 0.25); // Kecepatan awal
        rotate();
    };

    // FAKE NOTIF
    function showFakeNotif() {
        const names = ["Andi", "Budi", "Siti", "Dewi", "Rizky"];
        const prizes = ["Rp 50rb", "Rp 100rb", "Rp 200rb"];
        const div = document.getElementById("fakeNotify");
        div.innerHTML = `🔥 ${names[Math.floor(Math.random()*names.length)]} baru saja menang ${prizes[Math.floor(Math.random()*prizes.length)]}!`;
        div.style.display = "block";
        setTimeout(() => div.style.display = "none", 2500);
    }
</script>

</body>
</html>
