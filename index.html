<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin Lebaran</title>

<style>

body{
font-family: Arial;
background: linear-gradient(180deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
margin:0;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

h1{
color:#ffd700;
}

#wheel{
margin-top:20px;
border-radius:50%;
border:8px solid gold;
}

button{
margin-top:20px;
padding:15px 40px;
font-size:18px;
border:none;
border-radius:10px;
background:#ffcc00;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ffd633;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#00ffcc;
}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Spin Lebaran 2026 🎉</h1>

<p>Putar roda dan menangkan hadiah menarik!</p>

<canvas id="wheel" width="350" height="350"></canvas>

<br>

<button onclick="spin()">SPIN SEKARANG</button>

<div class="result" id="result"></div>

</div>


<script>

const segments = [
"Rp10.000",
"ZONK",
"Rp50.000",
"Rp20.000",
"Rp100.000",
"ZONK"
];

let startAngle = 0;
let arc = Math.PI / (segments.length/2);
let spinTimeout = null;
let spinAngleStart = 0;
let spinTime = 0;
let spinTimeTotal = 0;

function drawWheel(){

let canvas = document.getElementById("wheel");
let ctx = canvas.getContext("2d");

let outsideRadius = 150;
let textRadius = 120;
let insideRadius = 50;

ctx.clearRect(0,0,350,350);

for(let i=0;i<segments.length;i++){

let angle = startAngle + i * arc;

ctx.beginPath();
ctx.arc(175,175,outsideRadius,angle,angle+arc,false);
ctx.arc(175,175,insideRadius,angle+arc,angle,true);

ctx.fillStyle = i % 2 ? "#ffcc00" : "#ff5733";
ctx.fill();

ctx.save();
ctx.fillStyle="white";
ctx.translate(
175 + Math.cos(angle + arc/2) * textRadius,
175 + Math.sin(angle + arc/2) * textRadius
);

ctx.rotate(angle + arc/2);

ctx.fillText(segments[i],-20,0);

ctx.restore();

}

}

function spin(){

spinAngleStart = Math.random()*20+30;
spinTime=0;
spinTimeTotal=Math.random()*3000+4000;

rotateWheel();

}

function rotateWheel(){

spinTime+=30;

if(spinTime>=spinTimeTotal){
stopRotateWheel();
return;
}

let spinAngle=spinAngleStart-easeOut(spinTime,0,spinAngleStart,spinTimeTotal);

startAngle+=(spinAngle*Math.PI/180);

drawWheel();

spinTimeout=setTimeout(rotateWheel,30);

}

function stopRotateWheel(){

clearTimeout(spinTimeout);

let degrees=startAngle*180/Math.PI+90;
let arcd=arc*180/Math.PI;
let index=Math.floor((360-degrees%360)/arcd);

let result=segments[index];

document.getElementById("result").innerHTML="🎁 Kamu menang: "+result;

}

function easeOut(t,b,c,d){
let ts=(t/=d)*t;
let tc=ts*t;
return b+c*(tc+-3*ts+3*t);
}

drawWheel();

</script>

</body>
</html>
