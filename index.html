<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Wheel Lebaran Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --emerald: #064e3b;
            --gold: #fbbf24;
            --deep-green: #022c22;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif;
            /* Background mewah dengan gradasi & pattern islami halus */
            background: 
                radial-gradient(circle at center, var(--emerald) 0%, var(--deep-green) 100%);
            background-attachment: fixed;
            color: white;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* DEKORASI SAMPING KIRI & KANAN (BIAR GAK POLOS) */
        .decor-side {
            position: fixed;
            bottom: 0;
            width: 250px;
            height: 400px;
            z-index: 1;
            opacity: 0.6;
            pointer-events: none;
        }
        .left-side { 
            left: -50px; 
            background: url('https://www.transparentpng.com/download/islamic-frame/gold-islamic-frame-free-png-W9VqXy.png') no-repeat bottom left;
            background-size: contain;
        }
        .right-side { 
            right: -50px; 
            background: url('https://www.transparentpng.com/download/islamic-frame/gold-islamic-frame-free-png-W9VqXy.png') no-repeat bottom right;
            background-size: contain;
            transform: scaleX(-1);
        }

        /* DEKORASI ATAS (LAMPU GANTUNG) */
        .top-lantern {
            position: fixed;
            top: 0; width: 100%;
            height: 150px;
            background: url('https://www.pngarts.com/files/11/Vector-Islamic-Lamp-PNG-Free-Download.png') repeat-x top center;
            background-size: 120px;
            z-index: 1;
            opacity: 0.8;
        }

        .container { 
            position: relative; 
            z-index: 10; 
            text-align: center; 
            width: 100%; 
            padding: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
            margin: 0; font-size: clamp(32px, 10vw, 55px);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #welcomeText { 
            font-size: 14px; 
            letter-spacing: 2px; 
            color: #fef3c7; 
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .wheel-box {
            position: relative;
            width: clamp(320px, 85vw, 480px);
            height: clamp(320px, 85vw, 480px);
            margin: 15px auto;
            border: 12px solid #d97706; 
            outline: 5px solid var(--gold); 
            border-radius: 50%;
            box-shadow: 0 0 80px rgba(0,0,0,0.8), 0 0 30px rgba(251, 191, 36, 0.4);
            background: var(--gold);
        }

        #wheel { width: 100%; height: 100%; border-radius: 50%; transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1); }

        .marker {
            position: absolute;
            top: -20px; left: 50%;
            transform: translateX(-50%);
            width: 50px; height: 60px;
            background: #e11d48;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 100;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
            border-top: 4px solid #fff;
        }

        button#spinBtn {
            font-family: 'Montserrat', sans-serif;
            padding: 22px 80px;
            font-size: 24px; font-weight: 900;
            background: linear-gradient(180deg, #fbbf24 0%, #d97706 100%);
            color: var(--deep-green);
            border: none;
            border-bottom: 6px solid #92400e;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 20px;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button#spinBtn:hover:not(:disabled) { transform: translateY(-3px); background: #fff; }
        button#spinBtn:active { transform: translateY(2px); border-bottom: 2px solid #92400e; }
        button#spinBtn:disabled { background: #4b5563; cursor: not-allowed; }

        #fakeNotify {
            position: fixed; bottom: 25px;
            background: white; color: black;
            padding: 12px 25px; border-radius: 8px;
            font-size: 13px; font-weight: 800;
            display: none; z-index: 99;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border-left: 10px solid var(--gold);
        }

        .swal-lebaran-popup { background: var(--deep-green) !important; border: 4px solid var(--gold) !important; color: white !important; }
    </style>
</head>
<body>

<div class="top-lantern"></div>
<div class="decor-side left-side"></div>
<div class="decor-side right-side"></div>

<div class="container">
    <h1>EID MEGA WHEEL</h1>
    <p id="welcomeText">Ambil Keberuntungan Lebaranmu!</p>

    <div class="wheel-box">
        <div class="marker"></div>
        <canvas id="wheel" width="600" height="600"></canvas>
    </div>

    <button id="spinBtn">PUTAR RODA</button>
</div>

<div id="fakeNotify"></div>

<script>
    // LOGIKA RODA (Sama persis dengan keinginan kamu, tidak diotak-atik)
    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spinBtn");
    
    const sectors = [
        { label: "50.000", color: "#064e3b" },
        { label: "75.000", color: "#059669" },
        { label: "100.000", color: "#064e3b" },
        { label: "150.000", color: "#059669" },
        { label: "200.000", color: "#064e3b" },
        { label: "50.000", color: "#059669" },
        { label: "75.000", color: "#064e3b" },
        { label: "100.000", color: "#059669" }
    ];

    const tot = sectors.length;
    const arc = 2 * Math.PI / tot;
    let currentRotation = 0;
    let username = "";

    function drawWheel() {
        sectors.forEach((sector, i) => {
            const ang = arc * i;
            ctx.save();
            ctx.beginPath();
            ctx.fillStyle = sector.color;
            ctx.moveTo(300, 300);
            ctx.arc(300, 300, 300, ang, ang + arc);
            ctx.lineTo(300, 300);
            ctx.fill();
            ctx.strokeStyle = "rgba(251, 191, 36, 0.5)";
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.translate(300, 300);
            ctx.rotate(ang + arc / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#fff";
            ctx.font = "900 28px Montserrat";
            ctx.fillText(sector.label, 270, 10);
            ctx.restore();
        });
    }

    window.onload = () => { drawWheel(); loginUser(); };

    function loginUser() {
        Swal.fire({
            title: 'MASUKKAN USER ID',
            input: 'text',
            inputPlaceholder: 'ID AKUN...',
            allowOutsideClick: false,
            confirmButtonText: 'KONFIRMASI',
            confirmButtonColor: '#fbbf24',
            customClass: { popup: 'swal-lebaran-popup' }
        }).then((result) => {
            if (result.value) {
                username = result.value.trim().toUpperCase();
                if (localStorage.getItem("claim_" + username)) {
                    Swal.fire({ icon: 'warning', title: 'ID TERDAFTAR', text: `ID ${username} SUDAH PERNAH CLAIM!`, customClass: { popup: 'swal-lebaran-popup' } }).then(() => loginUser());
                } else {
                    document.getElementById("welcomeText").innerHTML = `PLAYER: <span style="color:var(--gold)">${username}</span>`;
                    setInterval(showFakeNotif, 5000);
                }
            }
        });
    }

    spinBtn.onclick = () => {
        if (!username || spinBtn.disabled) return;
        spinBtn.disabled = true;
        const totalSpin = 2160 + Math.floor(Math.random() * 360);
        currentRotation += totalSpin;
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
            const netRotation = currentRotation % 360;
            const winningIndex = Math.floor(((360 - netRotation + 270) % 360) / (360 / tot));
            const prize = sectors[winningIndex].label;
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#fbbf24', '#fff'] });

            Swal.fire({
                title: 'SELAMAT!',
                html: `<div style="font-size:18px">ID ${username} MENANG:</div><br><h1 style="color:var(--gold); font-size:50px; margin:0">Rp ${prize}</h1>`,
                icon: 'success',
                confirmButtonText: 'CLAIM SALDO',
                confirmButtonColor: '#059669',
                customClass: { popup: 'swal-lebaran-popup' }
            }).then(() => {
                localStorage.setItem("claim_" + username, "true");
                window.location.href = "https://lawaswow.com/?user=" + username + "&prize=" + prize;
            });
        }, 6100);
    };

    function showFakeNotif() {
        const names = ["USER", "GACOR", "HOKI", "SULTAN", "BOSS"];
        const prizes = ["50.000", "100.000", "200.000"];
        const u = names[Math.floor(Math.random()*names.length)] + Math.floor(Math.random()*999);
        const p = prizes[Math.floor(Math.random()*prizes.length)];
        const div = document.getElementById("fakeNotify");
        div.innerHTML = `💸 <b>${u}</b> BARU SAJA CLAIM <b>Rp ${p}</b>!`;
        div.style.display = "block";
        setTimeout(() => div.style.display = "none", 3000);
    }
</script>

</body>
</html>
