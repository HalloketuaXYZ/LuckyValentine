<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Wheel Lebaran 2026 - Jackpot Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --emerald: #064e3b;
            --gold: #fbbf24;
            --white-gold: #fef3c7;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Impact', 'Arial Black', sans-serif; /* PAKE FONT IMPACT */
            background: radial-gradient(circle, #065f46 0%, #022c22 100%);
            color: white;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }

        .container { position: relative; z-index: 10; text-align: center; width: 100%; }

        h1 {
            color: var(--gold);
            text-shadow: 3px 3px 10px rgba(0,0,0,0.7);
            margin: 10px 0; font-size: clamp(30px, 10vw, 50px);
            text-transform: uppercase; letter-spacing: 3px;
        }

        #welcomeText { font-family: 'Arial', sans-serif; font-weight: bold; }

        /* MEGA WHEEL BOX */
        .wheel-box {
            position: relative;
            width: clamp(320px, 85vw, 480px);
            height: clamp(320px, 85vw, 480px);
            margin: 20px auto;
            border: 15px solid var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(251, 191, 36, 0.5), inset 0 0 30px rgba(0,0,0,0.5);
            background: var(--gold);
        }

        #wheel {
            width: 100%; height: 100%;
            border-radius: 50%;
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
        }

        /* JARUM PENUNJUK (Marker) */
        .marker {
            position: absolute;
            top: -25px; left: 50%;
            transform: translateX(-50%);
            width: 45px; height: 55px;
            background: #ff0000;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 100;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8));
            border-top: 5px solid white;
        }

        button#spinBtn {
            font-family: 'Impact', sans-serif;
            padding: 20px 70px;
            font-size: 28px; font-weight: 900;
            background: linear-gradient(180deg, #fbbf24 0%, #d97706 100%);
            color: #064e3b;
            border: 4px solid #fff;
            border-radius: 15px; /* Lebih kotak ala Impact */
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            margin-top: 25px;
            transition: 0.2s;
            text-transform: uppercase;
        }

        button#spinBtn:hover { transform: translateY(-5px) scale(1.05); background: #fff; color: #d97706; }
        button#spinBtn:disabled { background: #666; cursor: not-allowed; opacity: 0.7; transform: none; }

        /* MODAL CUSTOM THEME */
        .swal-lebaran-popup {
            background: var(--emerald) !important;
            border: 5px solid var(--gold) !important;
            color: white !important;
            border-radius: 0 !important; /* Kotak biar makin Impact */
        }
        .swal-lebaran-title { 
            font-family: 'Impact', sans-serif !important; 
            color: var(--gold) !important; 
            font-size: 35px !important;
            text-transform: uppercase;
        }

        #fakeNotify {
            position: fixed; bottom: 30px;
            background: rgba(255, 255, 255, 0.95);
            color: #111; padding: 12px 25px;
            border-radius: 10px; font-size: 14px; font-weight: bold;
            display: none; z-index: 99;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            border-left: 8px solid #fbbf24;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎆 EID MEGA WHEEL 🎆</h1>
    <p id="welcomeText" style="color: var(--white-gold);">SIAPKAN USER ID UNTUK BERKAH LEBARAN!</p>

    <div class="wheel-box">
        <div class="marker"></div>
        <canvas id="wheel" width="600" height="600"></canvas>
    </div>

    <button id="spinBtn">SPIN SEKARANG</button>
</div>

<div id="fakeNotify"></div>

<script>
    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spinBtn");
    
    const sectors = [
        { label: "50.000", color: "#065f46" },
        { label: "75.000", color: "#047857" },
        { label: "100.000", color: "#065f46" },
        { label: "150.000", color: "#047857" },
        { label: "200.000", color: "#065f46" },
        { label: "50.000", color: "#047857" },
        { label: "75.000", color: "#065f46" },
        { label: "100.000", color: "#047857" }
    ];

    const tot = sectors.length;
    const arc = 2 * Math.PI / tot;
    let currentRotation = 0;
    let username = "";

    function drawWheel() {
        sectors.forEach((sector, i) => {
            const ang = arc * i;
            ctx.save();
            ctx.beginPath();
            ctx.fillStyle = sector.color;
            ctx.moveTo(300, 300);
            ctx.arc(300, 300, 300, ang, ang + arc);
            ctx.lineTo(300, 300);
            ctx.fill();
            ctx.strokeStyle = "#fbbf24";
            ctx.lineWidth = 5;
            ctx.stroke();

            ctx.translate(300, 300);
            ctx.rotate(ang + arc / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#fff";
            ctx.font = "900 32px Impact"; // FONT IMPACT DI DALAM RODA
            ctx.fillText(sector.label, 270, 12);
            ctx.restore();
        });
    }

    window.onload = () => {
        drawWheel();
        Swal.fire({
            title: 'MASUKKAN USER ID',
            text: 'ID ANDA ADALAH KUNCI KEBERUNTUNGAN!',
            input: 'text',
            inputPlaceholder: 'USERNAME...',
            allowOutsideClick: false,
            confirmButtonText: 'GAS MAIN!',
            customClass: {
                popup: 'swal-lebaran-popup',
                title: 'swal-lebaran-title'
            },
            confirmButtonColor: '#fbbf24',
            preConfirm: (value) => {
                if (!value) return Swal.showValidationMessage('ID WAJIB DIISI!');
                return value;
            }
        }).then((result) => {
            if (result.value) {
                username = result.value.toUpperCase();
                document.getElementById("welcomeText").innerHTML = `PLAYER: <span style="color:yellow">${username}</span>`;
                setInterval(showFakeNotif, 5000);
            }
        });
    };

    // EFEK JACKPOT (Petasan & Koin)
    function launchJackpot() {
        // Efek Petasan (Fireworks)
        var duration = 5 * 1000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

        function randomInRange(m, M) { return Math.random() * (M - m) + m; }

        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);
            var particleCount = 50 * (timeLeft / duration);
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
        }, 250);

        // Efek Hujan Koin
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#fbbf24', '#d97706', '#fff']
        });
    }

    spinBtn.onclick = () => {
        if (!username) return;
        spinBtn.disabled = true;

        const randomExtra = Math.floor(Math.random() * 360);
        const totalSpin = 2160 + randomExtra; // Minimal 6 putaran biar lama
        currentRotation += totalSpin;
        
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
            const netRotation = currentRotation % 360;
            const winningIndex = Math.floor(((360 - netRotation + 270) % 360) / (360 / tot));
            const prize = sectors[winningIndex].label;

            // PANGGIL PETASAN & KOIN
            launchJackpot();

            Swal.fire({
                title: 'JACKPOT!!',
                html: `<div style="font-family:Impact; font-size:20px">PLAYER <b>${username}</b> MENANG:</div><br><h1 style="color:#fbbf24; font-size:60px; font-family:Impact; margin:0">Rp ${prize}</h1>`,
                icon: 'success',
                confirmButtonText: 'AMBIL SALDO SEKARANG',
                confirmButtonColor: '#065f46',
                customClass: { popup: 'swal-lebaran-popup', title: 'swal-lebaran-title' }
            }).then(() => {
                window.location.href = "https://lawaswow.com/?user=" + username + "&prize=" + prize;
                spinBtn.disabled = false;
            });
        }, 5100);
    };

    function showFakeNotif() {
        const names = ["USER", "GACOR", "HOKI", "PLAYER", "BOSS", "SULTAN"];
        const prizes = ["50.000", "100.000", "200.000"];
        const u = names[Math.floor(Math.random()*names.length)] + Math.floor(Math.random()*999);
        const p = prizes[Math.floor(Math.random()*prizes.length)];
        const div = document.getElementById("fakeNotify");
        div.innerHTML = `🔥 <b>${u}</b> BARU SAJA CLAIM <b>Rp ${p}</b>!`;
        div.style.display = "block";
        setTimeout(() => div.style.display = "none", 3000);
    }
</script>

</body>
</html>
