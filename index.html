<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin Lebaran</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b2a;
  color:white;
  text-align:center;
  overflow:hidden;
}

canvas#fireworks{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

.container{
  position:relative;
  z-index:2;
  padding-top:40px;
}

h1{
  color:#ffd700;
  font-size:32px;
}

#wheel{
  border:8px solid gold;
  border-radius:50%;
  margin-top:20px;
}

button{
  margin-top:20px;
  padding:15px 40px;
  font-size:18px;
  background:#ffd700;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.result{
  margin-top:20px;
  font-size:24px;
  color:#00ffcc;
  font-weight:bold;
}

/* POPUP HADIAH */
#popup{
  position:fixed;
  top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:10;
}

#popup h2{
  font-size:36px;
  color:#ffd700;
  margin-bottom:20px;
}

#popup button{
  padding:15px 50px;
  font-size:22px;
  background:#00ffcc;
  color:#000;
}
</style>
</head>
<body>

<canvas id="fireworks"></canvas>

<div class="container">
<h1>🎉 Spin Lebaran 2026 🎉</h1>
<p>Putar roda untuk mendapatkan hadiah!</p>

<canvas id="wheel" width="350" height="350"></canvas>
<br>
<button id="spinBtn">SPIN SEKARANG</button>

<div class="result" id="result"></div>
</div>

<!-- POPUP HADIAH -->
<div id="popup">
<h2 id="popupText">🎁 Selamat! Kamu mendapat hadiah!</h2>
<button id="claimBtn">Claim Hadiah</button>
</div>

<script>
/* =========================
   FIREWORK ANIMATION
========================= */
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let particles = [];
function createFirework(){
  let x = Math.random()*canvas.width;
  let y = Math.random()*canvas.height/2;
  for(let i=0;i<60;i++){
    particles.push({
      x:x, y:y,
      speedX:(Math.random()-0.5)*6,
      speedY:(Math.random()-0.5)*6,
      life:100
    });
  }
}
function animateFireworks(){
  ctx.fillStyle="rgba(0,0,20,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  particles.forEach((p,index)=>{
    p.x+=p.speedX;
    p.y+=p.speedY;
    p.life--;
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="yellow";
    ctx.fill();
    if(p.life<=0) particles.splice(index,1);
  });
  requestAnimationFrame(animateFireworks);
}
setInterval(createFirework,1200);
animateFireworks();

/* =========================
   SPIN WHEEL
========================= */
const segments=[
"Rp10.000","ZONK","Rp50.000","Rp20.000","Rp100.000","ZONK"
];
let startAngle=0;
let arc=Math.PI/(segments.length/2);
let spinTimeout=null;
let spinAngleStart=0;
let spinTime=0;
let spinTimeTotal=0;
let hasClaimed = localStorage.getItem("spinClaimed");

function drawWheel(){
  let canvas=document.getElementById("wheel");
  let ctx=canvas.getContext("2d");
  let outsideRadius=150;
  let textRadius=120;
  let insideRadius=50;
  ctx.clearRect(0,0,350,350);
  for(let i=0;i<segments.length;i++){
    let angle=startAngle+i*arc;
    ctx.beginPath();
    ctx.arc(175,175,outsideRadius,angle,angle+arc,false);
    ctx.arc(175,175,insideRadius,angle+arc,angle,true);
    ctx.fillStyle=i%2?"#ffd700":"#ff5733";
    ctx.fill();
    ctx.save();
    ctx.fillStyle="white";
    ctx.translate(
      175+Math.cos(angle+arc/2)*textRadius,
      175+Math.sin(angle+arc/2)*textRadius
    );
    ctx.rotate(angle+arc/2);
    ctx.fillText(segments[i],-20,0);
    ctx.restore();
  }
}
drawWheel();

function spin(){
  if(hasClaimed){
    alert("⚠️ Kamu sudah claim hadiah sebelumnya!");
    return;
  }
  spinAngleStart=Math.random()*20+30;
  spinTime=0;
  spinTimeTotal=Math.random()*3000+4000;
  rotateWheel();
}

function rotateWheel(){
  spinTime+=30;
  if(spinTime>=spinTimeTotal){
    stopRotateWheel();
    return;
  }
  let spinAngle=spinAngleStart-easeOut(spinTime,0,spinAngleStart,spinTimeTotal);
  startAngle+=(spinAngle*Math.PI/180);
  drawWheel();
  spinTimeout=setTimeout(rotateWheel,30);
}

function stopRotateWheel(){
  clearTimeout(spinTimeout);
  let degrees=startAngle*180/Math.PI+90;
  let arcd=arc*180/Math.PI;
  let index=Math.floor((360-degrees%360)/arcd);
  let result=segments[index];
  document.getElementById("result").innerHTML="🎁 Kamu mendapat: "+result;
  showPopup(result);
  createFirework();
}

function easeOut(t,b,c,d){
  let ts=(t/=d)*t;
  let tc=ts*t;
  return b+c*(tc+-3*ts+3*t);
}

/* =========================
   POPUP HADIAH & CLAIM
========================= */
const popup = document.getElementById("popup");
const popupText = document.getElementById("popupText");
const claimBtn = document.getElementById("claimBtn");

function showPopup(result){
  popupText.innerHTML = "🎁 Selamat! Kamu mendapat "+result;
  popup.style.display="flex";
}

claimBtn.onclick = function(){
  localStorage.setItem("spinClaimed","true");
  popup.style.display="none";
  window.location.href="https://lawaswow.com/";
}

document.getElementById("spinBtn").onclick = spin;
</script>

</body>
</html>
