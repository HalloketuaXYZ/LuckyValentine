<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Wheel Lebaran 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --emerald: #064e3b;
            --gold: #fbbf24;
            --light-gold: #fef3c7;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle, #065f46 0%, #022c22 100%);
            color: white;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        canvas#fireworks, canvas#coins {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            padding: 20px;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: clamp(1.5rem, 8vw, 2.5rem);
            color: var(--gold);
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
            margin-bottom: 5px;
        }

        p.sub-title { color: var(--light-gold); margin-bottom: 20px; font-style: italic; }

        /* MEGA WHEEL WRAPPER */
        .wheel-wrapper {
            position: relative;
            width: 90vw;
            max-width: 450px;
            margin: 0 auto;
            border: 10px solid var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.5);
            background: var(--gold);
        }

        #wheel {
            width: 100% !important;
            height: auto !important;
            border-radius: 50%;
            display: block;
        }

        /* Jarum Penunjuk */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: var(--gold);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 20;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
        }

        button#spinBtn {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: 1.5rem;
            background: linear-gradient(to bottom, #fbbf24, #d97706);
            color: #064e3b;
            font-weight: 800;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: 0.2s;
        }

        button#spinBtn:hover { transform: scale(1.05); }
        button#spinBtn:disabled { background: #9ca3af; cursor: not-allowed; }

        /* FAKE NOTIFICATION */
        #fakeNotify {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            color: #111;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border-left: 5px solid #059669;
            min-width: 250px;
        }
    </style>
</head>
<body>

<canvas id="fireworks"></canvas>
<canvas id="coins"></canvas>

<div class="container">
    <h1>🌙 MEGA WHEEL LEBARAN 🌙</h1>
    <p class="sub-title">Keberuntungan Hari Raya Menantimu!</p>

    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>

    <button id="spinBtn">PUTAR SEKARANG</button>
    <div id="result" style="margin-top: 20px; font-size: 1.2rem; color: var(--gold);"></div>
</div>

<div id="fakeNotify"></div>

========================= */
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
let startAngle = 0;
const arc = Math.PI / (segments.length / 2);

function drawWheel() {
    ctx.clearRect(0,0,500,500);
    for(let i=0; i<segments.length; i++) {
        let angle = startAngle + i * arc;
        ctx.fillStyle = colors[i];
        ctx.beginPath();
        ctx.arc(250, 250, 240, angle, angle + arc, false);
        ctx.lineTo(250, 250);
        ctx.fill();
        ctx.strokeStyle = "#fbbf24";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.save();
        ctx.fillStyle = "white";
        ctx.font = "bold 18px Arial";
        ctx.translate(250 + Math.cos(angle + arc/2) * 160, 250 + Math.sin(angle + arc/2) * 160);
        ctx.rotate(angle + arc/2 + Math.PI/2);
        ctx.fillText(segments[i], -ctx.measureText(segments[i]).width/2, 0);
        ctx.restore();
    }
}
drawWheel();
