<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Wheel Hadiah Lebaran</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --emerald: #064e3b;
            --gold: #fbbf24;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle, #065f46 0%, #022c22 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
        }

        h1 {
            color: var(--gold);
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
            margin: 10px 0;
            font-size: clamp(24px, 8vw, 36px);
            text-transform: uppercase;
        }

        /* MEGA WHEEL BOX */
        .wheel-box {
            position: relative;
            width: clamp(300px, 85vw, 450px);
            height: clamp(300px, 85vw, 450px);
            margin: 20px auto;
            border: 12px solid var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
            background: var(--gold);
        }

        canvas#wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        /* JARUM PENUNJUK */
        .marker {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 35px solid #e11d48; /* Merah Menyala */
            z-index: 100;
            filter: drop-shadow(0 4px 5px rgba(0,0,0,0.5));
        }

        button#spinBtn {
            padding: 18px 50px;
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(180deg, #fbbf24 0%, #d97706 100%);
            color: #064e3b;
            border: 2px solid #fff;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            margin-top: 15px;
            transition: 0.2s;
        }

        button#spinBtn:hover { transform: scale(1.05); }
        button#spinBtn:active { transform: scale(0.95); }

        /* Fake Notif di Bawah */
        #fakeNotify {
            position: fixed;
            bottom: 30px;
            background: rgba(255, 255, 255, 0.95);
            color: #111;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            display: none;
            z-index: 99;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            border-left: 6px solid #10b981;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎊 EID MEGA WHEEL 🎊</h1>
    <p id="welcomeText" style="color: #fef3c7; font-style: italic;">Memuat permainan...</p>

    <div class="wheel-box">
        <div class="marker"></div>
        <canvas id="wheel" width="600" height="600"></canvas>
    </div>

    <button id="spinBtn">SPIN SEKARANG</button>
</div>

<div id="fakeNotify"></div>

<script>
    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spinBtn");
    
    // DAFTAR HADIAH (Sesuai Permintaan: Tanpa Zonk)
    const sectors = [
        { label: "Rp 50.000", color: "#065f46" },
        { label: "Rp 150.000", color: "#047857" },
        { label: "Rp 75.000", color: "#065f46" },
        { label: "Rp 100.000", color: "#047857" },
        { label: "Rp 200.000", color: "#065f46" },
        { label: "Rp 50.000", color: "#047857" },
        { label: "Rp 100.000", color: "#065f46" },
        { label: "Rp 75.000", color: "#047857" }
    ];

    const tot = sectors.length;
    const arc = 2 * Math.PI / tot;
    let currentRotation = 0;
    let isSpinning = false;
    let username = "";

    // GAMBAR RODA
    function drawWheel() {
        sectors.forEach((sector, i) => {
            const angStart = arc * i;
            ctx.save();
            ctx.beginPath();
            ctx.fillStyle = sector.color;
            ctx.moveTo(300, 300);
            ctx.arc(300, 300, 300, angStart, angStart + arc);
            ctx.lineTo(300, 300);
            ctx.fill();
            ctx.strokeStyle = "#fbbf24";
            ctx.lineWidth = 2;
            ctx.stroke();

            // Tulisan Nominal
            ctx.translate(300, 300);
            ctx.rotate(angStart + arc / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#fff";
            ctx.font = "bold 28px Arial";
            ctx.fillText(sector.label, 280, 10);
            ctx.restore();
        });
    }

    // POPUP LOGIN
    document.addEventListener("DOMContentLoaded", () => {
        drawWheel();
        Swal.fire({
            title: 'Masukkan ID Pemain',
            input: 'text',
            inputPlaceholder: 'Contoh: AkunHoki88',
            allowOutsideClick: false,
            confirmButtonText: 'Main Sekarang',
            confirmButtonColor: '#065f46'
        }).then((result) => {
            if (result.value) {
                username = result.value;
                document.getElementById("welcomeText").innerHTML = `Selamat Berjuang, <b>${username}</b>!`;
                setInterval(showFakeNotif, 4500);
            }
        });
    });

    // LOGIKA SPIN
    spinBtn.onclick = () => {
        if (!username || isSpinning) return;

        isSpinning = true;
        // Putaran acak minimal 5 kali putaran + offset acak
        const randomDegree = Math.floor(Math.random() * 360) + 1800; 
        currentRotation += randomDegree;
        
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        // Hitung hasil setelah berhenti (5 detik sesuai durasi CSS)
        setTimeout(() => {
            isSpinning = false;
            const actualDeg = currentRotation % 360;
            // Koreksi arah jarum (puncak roda adalah 270 derajat dalam canvas)
            const winningIndex = Math.floor((360 - actualDeg) / (360 / tot)) % tot;
            const prize = sectors[winningIndex].label;

            Swal.fire({
                title: '🎉 SELAMAT! 🎉',
                html: `User <b>${username}</b> mendapatkan hadiah:<br><h2 style="color:#065f46">${prize}</h2>`,
                icon: 'success',
                confirmButtonText: 'CLAIM HADIAH SEKARANG',
                confirmButtonColor: '#d97706'
            }).then(() => {
                window.location.href = "https://lawaswow.com/?prize=" + prize;
            });
        }, 5000);
    };

    // NOTIFIKASI PALSU LEBIH RANDOM
    function showFakeNotif() {
        const names = ["Rian", "Salsa", "Fahri", "Anita", "Dimas", "Eko_Gaming", "Putri88", "User_Hoki", "Guntur", "Santi"];
        const prizes = ["Rp 50.000", "Rp 75.000", "Rp 100.000", "Rp 150.000", "Rp 200.000"];
        
        const randomName = names[Math.floor(Math.random() * names.length)] + (Math.floor(Math.random() * 99));
        const randomPrize = prizes[Math.floor(Math.random() * prizes.length)];
        
        const div = document.getElementById("fakeNotify");
        div.innerHTML = `🔔 <b>${randomName}</b> baru saja mendapatkan <b>${randomPrize}</b>!`;
        div.style.display = "block";
        
        setTimeout(() => { div.style.display = "none"; }, 3000);
    }
</script>

</body>
</html>
